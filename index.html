        Object.entries(window.simState).forEach(([key, sim]) => {
          let tName = String(sim.team).trim().toUpperCase();
          if (tName === 'TOK' || tName === 'TK' || tName === 'TOKYO') tName = 'TKO';

          if (sim.points > 0 && sim._predicted) {
            hasPredictions = true;
            if (predictedOverallScores[tName] !== undefined) {
              predictedOverallScores[tName] += sim.points;
            }
          }
        });
      }

      let predictedScoreStr = '';
      if (hasPredictions) {
        predictedScoreStr = isJa
          ? '\n【シミュレーター上の予測最終スコア（暫定）】※現在ダッシュボード上で自動予測（または試算）されている最終着地予想です。\n'
          : '\n[Simulator Projected Final Score]\n';
        Object.entries(predictedOverallScores).sort((a,b) => b[1] - a[1]).forEach(([team, pts]) => {
          predictedScoreStr += `- ${team}: ${pts}pt\n`;
        });
        predictedScoreStr += isJa 
          ? '★最重要指示：レポートの冒頭（サマリー部分）で、現在の同点状況だけでなく、必ずこの「シミュレーター上の予測最終スコア（暫定）」の具体的なポイント数を提示し、「アベレージ予測通りだと何ポイント差で敗北してしまう見込みなのか」を明確に言語化した上で、それをどう覆すかの分析に進んでください。\n'
          : '*CRITICAL: In the executive summary, you MUST explicitly state these "Simulator Projected Final Scores" and explain the projected point gap before moving into how to overcome it.\n';
      }


      let optStr = '';
      if (optAthletes.size > 0) {
        optStr = isJa
          ? '\n【欠場・棄権（OPT）の選手一覧】※重要：これらの選手は試合に出場しないため、絶対に勝ち筋や期待する選手として挙げないでください。\n'
          : '\n[Absent/OPT Athletes List] *IMPORTANT: These athletes will NOT compete. Absolutely do NOT suggest them as part of a winning path.\n';
        optStr += `- ${Array.from(optAthletes).join(', ')}\n`;
      }

      const targetTeamEl = document.getElementById('aiTargetTeamVal');
      const targetTeam = targetTeamEl ? targetTeamEl.value : 'ALL';
      let teamPromptStr = '';
      if (targetTeam === 'ALL') {
        teamPromptStr = isJa 
          ? '全チームを対象に、総合的な視点で分析してください。'
          : 'Analyze comprehensively from the perspective of all teams.';
      } else {
        teamPromptStr = isJa
          ? `特に【${targetTeam}チームの専属アナリスト】として、${targetTeam}チームが優勝するためには具体的にどうすればよいか（誰が何位を取るべきか、どのライバルが崩れるべきか等）という視点を中心に、徹底的に分析してください。\nそして分析の結論として、必ず【今後の競技スケジュールと出場選手】のリストに記載されている「まだ出場予定の${targetTeam}チームの全選手（全員）」に対して、優勝するために最低限必要な「求められる戦績（目安となる順位やポイント）」をリストアップして提示してください。`
          : `As the exclusive analyst for Team ${targetTeam}, thoroughly analyze exactly what ${targetTeam} needs to do to win (who needs what placement, which rivals need to falter, etc.).\nAs a conclusion, you MUST list out the minimum "required results (target placements or points)" for ALL remaining athletes of Team ${targetTeam} listed in the [Remaining Events Schedule].`;
      }

      let remainingEventsStr = isJa
        ? '\n【今後の競技スケジュールと出場選手（各競技につき各チーム1名まで、指定選手のみ出場）】\n'
        : '\n[Remaining Events Schedule and Participating Athletes (Max 1 per team per event)]\n';
      
      if (state.sheetData && state.sheetData.nolaAthletes) {
        state.sheetData.nolaAthletes.forEach(disc => {
          const competingAthletes = [];
          disc.athletes.forEach(a => {
            const key = `${disc.title}-${a.name}`.replace(/[^a-zA-Z0-9]/g, '');
            const sim = window.simState && window.simState[key];
            if (!sim || (sim.points === 0 && String(sim.rank) !== '-1')) {
              competingAthletes.push(`${a.name} (${a.team || (isJa ? '無所属' : 'No Team')})`);
            }
          });
          if (competingAthletes.length > 0) {
            remainingEventsStr += `- ${disc.title}:\n    ${competingAthletes.join(', ')}\n`;
          }
        });
      }

      const promptStr = isJa ? `あなたはX Gamesのチーム対抗戦のデータアナリストです。現在のシミュレーション結果（Monte Carlo 10,000回）は以下の通りです。

【大会の予備知識】
- 本大会は4チーム（TKO, NY, LA, SP）による対抗戦です。
- 各競技の順位に応じて、以下のポイントが所属チームに付与されます。
  1位: 100pt / 2位: 80pt / 3位: 60pt / 4位: 40pt / 5位: 30pt / 6位: 20pt / 7位以下: 0pt
- 最終的に全競技の合計ポイントが最も高いチームが優勝となります。
- 大会には4チーム以外に「無所属（IND）」の選手も出場します。無所属の選手が上位に入った場合、その順位のポイントはどのチームにも入らず「消費」されます（例: 無所属が1位を取ると、各チームの最高獲得ポイントは2位の80ptになります）。
- 特定の競技に強い無所属選手がいる場合、彼らが上位を独占することで、ライバルチームの高得点を阻止する展開も考慮してください。

${rosterStr}
${optStr}
${overallScoreStr}
${predictedScoreStr}
${currentStateStr}
${remainingEventsStr}

【Monte Carlo 10,000回 シミュレーション結果データ】
${mcDataStr}

このデータと大会ルールをもとに、現在のスコア差と残り枠数を考慮し、各チームの勝率や逆転の可能性について、客観的な数値と確率に基づいた冷静で論理的な分析レポートを日本語で作成してください。
${teamPromptStr}
さらに、各チーム（または対象チーム）が優勝するために「具体的に今後のどの競技で、誰が何位以上（何ポイント以上）を獲得する必要があるか」など、必要な条件も具体的に提示してください。
その際、以下の点に厳密に従ってください。
1. 必ず【今後の競技スケジュールと出場選手】リストにある「まだ出場予定の選手と競技」だけを組み合わせて提案してください。
2. 絶対に【欠場・棄権（OPT）の選手一覧】に含まれる選手は提案から除外してください。
3. すでにポイントを獲得済みの選手が、同じ競技でさらにポイントを獲得するような提案はしないでください。
4. Markdown形式（見出し(##, ###)、太字(**)、箇条書き(- )など）を活用し、ダッシュボード上で美しく読みやすいレポートに仕上げてください。`
      : `You are a data analyst for the X Games team competition. The current Monte Carlo simulation (10,000 iterations) results are as follows.

[Tournament Background]
- 4 teams (TKO, NY, LA, SP).
- Points awarded by placement: 1st=100pt, 2nd=80pt, 3rd=60pt, 4th=40pt, 5th=30pt, 6th=20pt, 7th+=0pt.
- The team with highest total points wins.
- Independent (IND or No Team) athletes are also competing. If an IND athlete places highly, those points are NOT awarded to any team (e.g. if IND takes 1st, the max points a team can earn is 80pt for 2nd).
- Consider how strong IND athletes can block rival teams from scoring high points.

${rosterStr}
${optStr}
${overallScoreStr}
${predictedScoreStr}
${currentStateStr}
${remainingEventsStr}

[Monte Carlo 10,000 Iterations Data]
${mcDataStr}

Based on this data and rules, write an objective, logical analysis report in English about win rates and comeback possibilities.
${teamPromptStr}
Furthermore, you must provide concrete required conditions for the target team to win (e.g., "who needs to get what rank in which event").
Strictly follow these rules:
1. ONLY suggest athletes and events listed in the [Remaining Events Schedule].
2. NEVER suggest athletes listed in the [Absent/OPT Athletes List].
3. Do not suggest a player to earn points in an event if they already confirmed points.
4. Output a beautiful, readable report using Markdown (##, ###, **, -).`;

      window.aiChatHistory = [{ role: 'user', parts: [{ text: promptStr }] }];

      try {
        const response = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-pro-preview:generateContent?key=' + apiKey, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            contents: window.aiChatHistory,
            generationConfig: {
              temperature: 0.1,
              topK: 10,
              topP: 0.8
            }
          })
        });

        if (!response.ok) {
          throw new Error('API Error: ' + response.status);
        }

        const data = await response.json();
        const text = data.candidates[0].content.parts[0].text;
        
        window.aiChatHistory.push({ role: 'model', parts: [{ text: text }] });
        window.renderAiChat();

      } catch (err) {
        if (resPanel) {
          resPanel.innerHTML = '<div style="color: #ef4444; padding: 16px;">エラーが発生しました: ' + err.message + '</div>';
        }
      } finally {
        if (btn) { btn.disabled = false; btn.innerText = '✨ もう一度分析する'; }
      }
    };

    window.sendAiChatMessage = async function() {
      const input = document.getElementById('aiChatInput');
      const apiKey = 'AQ.Ab8RN6JfTk-xeknEs8Uhnz2awbh8Gg7t9TjnYuoJQUdwxYnY_A';
      const msg = input.value.trim();
      if (!msg || !apiKey || !window.aiChatHistory || window.aiChatHistory.length === 0) return;
      
      input.value = '';
      input.disabled = true;
      const btn = document.getElementById('aiChatSendBtn');
      btn.disabled = true;
      btn.innerText = '...';

      window.aiChatHistory.push({ role: 'user', parts: [{ text: msg }] });
      window.aiChatIsLoading = true;
      window.renderAiChat();

      try {
        const response = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-pro-preview:generateContent?key=' + apiKey, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: window.aiChatHistory,
            generationConfig: { temperature: 0.2 }
          })
        });

        if (!response.ok) throw new Error('API Error: ' + response.status);

        const data = await response.json();
        const text = data.candidates[0].content.parts[0].text;
        window.aiChatHistory.push({ role: 'model', parts: [{ text: text }] });
      } catch (err) {
        window.aiChatHistory.push({ role: 'model', parts: [{ text: 'エラーが発生しました: ' + err.message }] });
      } finally {
        window.aiChatIsLoading = false;
        window.renderAiChat();
        setTimeout(() => document.getElementById('aiChatInput').focus(), 100);
      }
    };

    window.renderAiChat = function() {
      const resPanel = document.getElementById('aiAnalysisResult');
      if (!resPanel) return;
      
      let html = '<div style="display: flex; flex-direction: column; gap: 16px;">';
      window.aiChatHistory.forEach((msg, idx) => {
        if (idx === 0) return; // Skip initial system prompt
        const isUser = msg.role === 'user';
        let safeText = msg.parts[0].text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
        let content = typeof marked !== 'undefined' ? marked.parse(safeText) : safeText.replace(/\n/g, '<br>');
        
        html += `
          <div class="ai-chat-bubble ${isUser ? 'user' : ''}">
            ${content}
          </div>
        `;
      });
      if (window.aiChatIsLoading) {
        html += `
          <div style="align-self: flex-start; max-width: 100%; width: 100%; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 20px 24px; line-height: 1.6; color: #cbd5e1; font-size: 0.95rem; display: flex; align-items: center; gap: 8px;">
            <svg width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" stroke="#a855f7" class="ai-spinner">
              <style>.ai-spinner{animation: ai-spin 1s linear infinite;} @keyframes ai-spin { 100% { transform: rotate(360deg); } }</style>
              <circle cx="12" cy="12" r="10" fill="none" stroke-width="3" stroke-linecap="round" stroke-dasharray="16 32"></circle>
            </svg>
            AIが考えています...
          </div>
        `;
      }
      
      html += '</div>';

      const inputDisabled = window.aiChatIsLoading ? 'disabled' : '';
      const inputPlaceholder = window.aiChatIsLoading ? 'AIが考え中...' : '質問や追加条件を入力...';
      const btnStyle = window.aiChatIsLoading ? 'background: #64748b; cursor: not-allowed;' : 'background: linear-gradient(135deg, #a855f7, #6366f1); cursor: pointer;';
      const btnText = window.aiChatIsLoading ? '送信中...' : '送信';

      html += `
        <div style="margin-top: 20px; border-top: 1px solid rgba(168, 85, 247, 0.4); padding-top: 16px;">
          <div style="display: flex; gap: 8px;">
            <input type="text" id="aiChatInput" placeholder="${inputPlaceholder}" ${inputDisabled} style="flex: 1; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; padding: 10px 16px; color: #fff; outline: none; font-size: 0.95rem;" onkeypress="if(event.key === 'Enter') window.sendAiChatMessage()">
            <button id="aiChatSendBtn" onclick="window.sendAiChatMessage()" ${inputDisabled} style="${btnStyle} color: #fff; padding: 10px 24px; border: none; border-radius: 8px; font-weight: bold; transition: transform 0.2s;">${btnText}</button>
          </div>
        </div>
      `;
      
      resPanel.innerHTML = html;
      // Also apply some basic styling to markdown elements inside chat bubbles
      resPanel.querySelectorAll('ul, ol').forEach(el => { el.style.margin = '8px 0'; el.style.paddingLeft = '24px'; });
      resPanel.querySelectorAll('li').forEach(el => { el.style.marginBottom = '4px'; });
      resPanel.querySelectorAll('h1, h2, h3').forEach(el => { el.style.marginTop = '16px'; el.style.marginBottom = '8px'; el.style.color = '#fff'; });
    };

    createSheetButtons();
    refreshAll();
    window.loadAthletes('NOLA');
  </script>
